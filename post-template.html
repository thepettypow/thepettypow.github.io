<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post - Abolfazl Naderi</title>
    <style>
        body, html {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            color: #fff;
            height: 100%;
            width: 100%;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            background-color: #2a2a2a;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            margin: 20px;
            position: relative;
        }

        h1, h2 {
            color: #b3b3b3;
            position: relative;
            display: inline-block;
            overflow: hidden;
            margin: 20px 0;
        }

        h1::before, h2::before,
        h1::after, h2::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        h1::before, h2::before {
            left: -2px;
            text-shadow: 1px 0 red;
            animation: glitch1 1s infinite linear alternate-reverse;
        }

        h1::after, h2::after {
            left: 2px;
            text-shadow: -1px 0 blue;
            animation: glitch2 1.5s infinite linear alternate-reverse;
        }

        @keyframes glitch1 {
            0% {
                clip: rect(10px, 9999px, 25px, 0);
                transform: skew(0.5deg);
            }
            10% {
                clip: rect(15px, 9999px, 35px, 0);
                transform: skew(0.5deg);
            }
            20% {
                clip: rect(10px, 9999px, 15px, 0);
                transform: skew(0.5deg);
            }
            30% {
                clip: rect(20px, 9999px, 30px, 0);
                transform: skew(0.5deg);
            }
            40% {
                clip: rect(15px, 9999px, 20px, 0);
                transform: skew(0.5deg);
            }
            50% {
                clip: rect(20px, 9999px, 25px, 0);
                transform: skew(0.5deg);
            }
            60% {
                clip: rect(10px, 9999px, 15px, 0);
                transform: skew(0.5deg);
            }
            70% {
                clip: rect(20px, 9999px, 30px, 0);
                transform: skew(0.5deg);
            }
            80% {
                clip: rect(10px, 9999px, 25px, 0);
                transform: skew(0.5deg);
            }
            90% {
                clip: rect(15px, 9999px, 20px, 0);
                transform: skew(0.5deg);
            }
            100% {
                clip: rect(20px, 9999px, 25px, 0);
                transform: skew(0.5deg);
            }
        }

        @keyframes glitch2 {
            0% {
                clip: rect(15px, 9999px, 30px, 0);
                transform: skew(0.5deg);
            }
            10% {
                clip: rect(20px, 9999px, 35px, 0);
                transform: skew(0.5deg);
            }
            20% {
                clip: rect(10px, 9999px, 25px, 0);
                transform: skew(0.5deg);
            }
            30% {
                clip: rect(15px, 9999px, 20px, 0);
                transform: skew(0.5deg);
            }
            40% {
                clip: rect(10px, 9999px, 15px, 0);
                transform: skew(0.5deg);
            }
            50% {
                clip: rect(20px, 9999px, 30px, 0);
                transform: skew(0.5deg);
            }
            60% {
                clip: rect(15px, 9999px, 25px, 0);
                transform: skew(0.5deg);
            }
            70% {
                clip: rect(10px, 9999px, 20px, 0);
                transform: skew(0.5deg);
            }
            80% {
                clip: rect(20px, 9999px, 35px, 0);
                transform: skew(0.5deg);
            }
            90% {
                clip: rect(10px, 9999px, 15px, 0);
                transform: skew(0.5deg);
            }
            100% {
                clip: rect(15px, 9999px, 25px, 0);
                transform: skew(0.5deg);
            }
        }

        footer {
            width: 100%;
            padding: 10px;
            background-color: transparent; /* No background */
            color: #b3b3b3;
            text-align: center;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        @media (max-width: 600px) {
            .container {
                width: 95%;
                padding: 15px;
                margin: 10px;
            }

            h1, h2 {
                font-size: 1.5em;
            }
        }

        @media (max-width: 400px) {
            h1, h2 {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 data-text="Post Title">Post Title</h1>
        <h4></h4>
        <h2 data-text="Subtitle">Subtitle</h2>
        <p>
            Just a template for test the blog
        </p>
    </div>
    <footer>
        &copy; 2024 Petty Pow
    </footer>
</body>
</html>
